services:
  postgres:
    image: postgres:17-alpine

    container_name: mercadinho-postgres

    ports:
      - '5432:5432'

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mercadinho

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

    networks:
      - mercadinho-network

volumes:
  postgres_data:

networks:
  mercadinho-network:
    driver: bridge